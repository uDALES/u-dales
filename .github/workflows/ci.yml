name: CI

on: [push, pull_request]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-and-supported-tests:
    if: >
      github.event_name != 'push' ||
      !contains(github.event.head_commit.message, '[skip ci]')
    name: ${{ matrix.os }} ${{ matrix.build-type }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: ['ubuntu-latest', 'macos-latest']
        build-type: ['Debug', 'Release']

    steps:
    - name: Check-out project
      uses: actions/checkout@v6
      with:
        fetch-depth: 0
        submodules: recursive

    - name: Set up repository
      # Clone all history leading to the tip of a single branch
      # See https://stackoverflow.com/a/44036486.
      run: |
        git remote set-branches --add origin master
        git fetch origin master
        git fetch --tags origin

    - name: Install system dependencies
      run: bash .github/scripts/install_deps.sh

    - name: Install python dependencies
      uses: conda-incubator/setup-miniconda@9b650ee299f7fe47ab3a9688166e64e965c83272 # main (node24)
      with:
        miniconda-version: "latest"
        auto-update-conda: true
        activate-environment: udales
        environment-file: environment.yml
        channel-priority: strict

    - name: Build current branch for integration tests
      shell: bash -l {0}
      run: |
        build_dir="build/${{ matrix.build-type }}"
        build_dir="$(printf '%s' "$build_dir" | tr '[:upper:]' '[:lower:]')"
        source .github/scripts/setup_mpi_env.sh "${{ matrix.os }}"
        if [ ${{ matrix.os }} = 'macos-latest' ]; then
          which gfortran
          gfortran --version
          "$UDALES_MPI_FORTRAN_COMPILER" --showme:command || "$UDALES_MPI_FORTRAN_COMPILER" -show
        fi
        cmake -S . -B "$build_dir" \
          -DCMAKE_BUILD_TYPE=${{ matrix.build-type }} \
          -DCMAKE_Fortran_COMPILER="$UDALES_MPI_FORTRAN_COMPILER" \
          -DMPI_Fortran_COMPILER="$UDALES_MPI_FORTRAN_COMPILER" \
          -DMPI_C_COMPILER="$UDALES_MPI_C_COMPILER" \
          -DMPIEXEC_EXECUTABLE="$UDALES_MPIEXEC"
        cmake --build "$build_dir" -- -j 4

    - name: Build and test uDALES
      shell: bash -l {0}
      run: |
        source .github/scripts/setup_mpi_env.sh "${{ matrix.os }}"
        # Temporary: macOS skips the branch-comparison regression until master
        # contains the findFFTW helper-project CMake minimum-version fix.
        # Remove supported-macos and switch back to supported on macOS once
        # that fix has been merged into master.
        if [ "${{ matrix.os }}" = "macos-latest" ]; then
          selection="supported-macos"
        else
          selection="supported"
        fi
        python3 -u tests/run_tests.py "$selection" --branch-a master --branch-b $GITHUB_SHA --build-type ${{ matrix.build-type }}

  docs:
    if: >
      github.event_name != 'push' ||
      !contains(github.event.head_commit.message, '[skip ci]')
    name: docs
    runs-on: ubuntu-latest

    steps:
    - name: Check-out project
      uses: actions/checkout@v6
      with:
        fetch-depth: 0
        submodules: recursive

    - name: Set up repository
      run: |
        git remote set-branches --add origin master
        git fetch origin master
        git fetch --tags origin

    - name: Install system dependencies
      run: bash .github/scripts/install_deps.sh

    - name: Install python dependencies
      uses: conda-incubator/setup-miniconda@9b650ee299f7fe47ab3a9688166e64e965c83272 # main (node24)
      with:
        miniconda-version: "latest"
        auto-update-conda: true
        activate-environment: udales
        environment-file: environment.yml
        channel-priority: strict

    - name: Build docs
      shell: bash -l {0}
      run: |
        mkdocs build --site-dir build/html
        ford docs/udales-docs-software.md

    - name: Upload docs artifact
      uses: actions/upload-artifact@v7
      with:
        name: docs-html
        path: build/html/

  publish-docs:
    if: >
      github.event_name == 'push' &&
      github.ref == 'refs/heads/master' &&
      !contains(github.event.head_commit.message, '[skip ci]')
    name: publish-docs
    runs-on: ubuntu-latest
    needs: docs

    steps:
    - name: Download docs artifact
      uses: actions/download-artifact@v4
      with:
        name: docs-html
        path: build/html/

    - name: Publish docs
      uses: peaceiris/actions-gh-pages@v4
      with:
        github_token: ${{ secrets.GITHUB_TOKEN }}
        publish_dir: build/html/
        force_orphan: true
