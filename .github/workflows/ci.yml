name: CI

on: [push, pull_request]

jobs:
  main:
    if: >
      github.event_name != 'push' ||
      !contains(github.event.head_commit.message, '[skip ci]')
    name: ${{ matrix.os }} ${{ matrix.build-type }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: ['ubuntu-latest', 'macos-latest']
        build-type: ['Debug', 'Release']
    
    steps:
    - name: Check-out project
      uses: actions/checkout@v4
      with:
        submodules: recursive

    - name: Set up repository
      # Clone all history leading to the tip of a single branch
      # See https://stackoverflow.com/a/44036486.
      run: |
        git remote set-branches --add origin master
        git fetch origin master

    - name: Install system dependencies
      run: bash .github/scripts/install_deps.sh

    - name: Install python dependencies
      uses: conda-incubator/setup-miniconda@v3
      with:
        miniconda-version: "latest"
        auto-update-conda: true
        activate-environment: udales
        environment-file: environment.yml
        channel-priority: strict

    - name: Build current branch for integration tests
      shell: bash -l {0}
      run: |
        build_dir="build/${{ matrix.build-type }}"
        build_dir="${build_dir,,}"
        if [ ${{ matrix.os }} = 'macos-latest' ]; then
          MPI_PREFIX="$(brew --prefix open-mpi)"
          cmake -S . -B "$build_dir" \
            -DCMAKE_BUILD_TYPE=${{ matrix.build-type }} \
            -DCMAKE_Fortran_COMPILER="$MPI_PREFIX/bin/mpif90" \
            -DMPI_Fortran_COMPILER="$MPI_PREFIX/bin/mpif90" \
            -DMPI_C_COMPILER="$MPI_PREFIX/bin/mpicc" \
            -DMPIEXEC_EXECUTABLE="$MPI_PREFIX/bin/mpiexec"
        else
          cmake -S . -B "$build_dir" \
            -DCMAKE_BUILD_TYPE=${{ matrix.build-type }} \
            -DCMAKE_Fortran_COMPILER=/usr/bin/mpif90 \
            -DMPI_Fortran_COMPILER=/usr/bin/mpif90 \
            -DMPI_C_COMPILER=/usr/bin/mpicc \
            -DMPIEXEC_EXECUTABLE=/usr/bin/mpiexec
        fi
        cmake --build "$build_dir" -- -j 4

    - name: Build and test uDALES
      # 'shell' required to activate environment.
      # See https://github.com/conda-incubator/setup-miniconda#IMPORTANT.
      shell: bash -l {0}
      run: |
        if [ ${{ matrix.os }} = 'macos-latest' ]; then
          MPI_PREFIX="$(brew --prefix open-mpi)"
          export UDALES_CMAKE_ARGS="-DCMAKE_Fortran_COMPILER=$MPI_PREFIX/bin/mpif90 -DMPI_Fortran_COMPILER=$MPI_PREFIX/bin/mpif90 -DMPI_C_COMPILER=$MPI_PREFIX/bin/mpicc -DMPIEXEC_EXECUTABLE=$MPI_PREFIX/bin/mpiexec"
          export MPIEXEC="$MPI_PREFIX/bin/mpiexec"
        else
          export UDALES_CMAKE_ARGS="-DCMAKE_Fortran_COMPILER=/usr/bin/mpif90 -DMPI_Fortran_COMPILER=/usr/bin/mpif90 -DMPI_C_COMPILER=/usr/bin/mpicc -DMPIEXEC_EXECUTABLE=/usr/bin/mpiexec"
          export MPIEXEC=/usr/bin/mpiexec
        fi
        python3 -u tests/run_tests.py supported --branch-a master --branch-b $GITHUB_SHA --build-type ${{ matrix.build-type}}

    - name: Legacy tree regression
      if: matrix.os == 'ubuntu-latest' && matrix.build-type == 'Debug'
      shell: bash -l {0}
      run: |
        if [ ${{ matrix.os }} = 'macos-latest' ]; then
          MPI_PREFIX="$(brew --prefix open-mpi)"
          export UDALES_CMAKE_ARGS="-DCMAKE_Fortran_COMPILER=$MPI_PREFIX/bin/mpif90 -DMPI_Fortran_COMPILER=$MPI_PREFIX/bin/mpif90 -DMPI_C_COMPILER=$MPI_PREFIX/bin/mpicc -DMPIEXEC_EXECUTABLE=$MPI_PREFIX/bin/mpiexec"
          export MPIEXEC="$MPI_PREFIX/bin/mpiexec"
        else
          export UDALES_CMAKE_ARGS="-DCMAKE_Fortran_COMPILER=/usr/bin/mpif90 -DMPI_Fortran_COMPILER=/usr/bin/mpif90 -DMPI_C_COMPILER=/usr/bin/mpicc -DMPIEXEC_EXECUTABLE=/usr/bin/mpiexec"
          export MPIEXEC=/usr/bin/mpiexec
        fi
        python3 -u tests/regression/new_vegetation_module_against_v2.2/run_test.py v2.2.0 $GITHUB_SHA ${{ matrix.build-type }} --ci

    - name: Build docs
      if: matrix.os == 'ubuntu-latest' && matrix.build-type == 'Release'
      shell: bash -l {0}
      run: |
        mkdocs build --site-dir build/html
        ford docs/udales-docs-software.md

    - name: Publish docs
      if: matrix.os == 'ubuntu-latest' && matrix.build-type == 'Release' && github.event_name == 'push' && github.ref == 'refs/heads/master'
      uses: peaceiris/actions-gh-pages@v4
      with:
        github_token: ${{ secrets.GITHUB_TOKEN }}
        publish_dir: build/html/
        force_orphan: true
