description: Run curated test selections by support level from tests/test_suites.yml.

groups:
  supported:
    suites:
      - label: "supported: python namelist unit"
        class: supported
        purpose: unit
        command:
          - "{python}"
          - "-m"
          - "unittest"
          - "discover"
          - "-s"
          - "{repo_root}/tools/python/tests"
          - "-p"
          - "test_namelist.py"
      - label: "supported: python solar unit"
        class: supported
        purpose: unit
        command:
          - "{python}"
          - "-m"
          - "unittest"
          - "discover"
          - "-s"
          - "{repo_root}/tools/python/tests"
          - "-p"
          - "test_solar.py"
      - label: "supported: regression"
        class: supported
        purpose: regression
        command:
          - "{python}"
          - "{tests_dir}/regression/david_tests/run_tests.py"
          - "{branch_a}"
          - "{branch_b}"
          - "{build_type}"
      - label: "supported: ibm sparse input integration"
        class: supported
        purpose: integration
        env_UDALES_BUILD: "{repo_root}/build/{build_type_lower}/u-dales"
        command:
          - "bash"
          - "{tests_dir}/integration/ibm_sparse_input/run_test.sh"

  supported-macos:
    suites:
      - label: "supported: python namelist unit"
        class: supported
        purpose: unit
        command:
          - "{python}"
          - "-m"
          - "unittest"
          - "discover"
          - "-s"
          - "{repo_root}/tools/python/tests"
          - "-p"
          - "test_namelist.py"
      - label: "supported: python solar unit"
        class: supported
        purpose: unit
        command:
          - "{python}"
          - "-m"
          - "unittest"
          - "discover"
          - "-s"
          - "{repo_root}/tools/python/tests"
          - "-p"
          - "test_solar.py"
      - label: "supported: ibm sparse input integration"
        class: supported
        purpose: integration
        env_UDALES_BUILD: "{repo_root}/build/{build_type_lower}/u-dales"
        command:
          - "bash"
          - "{tests_dir}/integration/ibm_sparse_input/run_test.sh"

  experimental:
    suites:
      - label: "experimental: python directshortwave unit"
        class: experimental
        purpose: unit
        command:
          - "{python}"
          - "-m"
          - "unittest"
          - "discover"
          - "-s"
          - "{repo_root}/tools/python/tests"
          - "-p"
          - "test_directshortwave.py"
      - label: "experimental: python directshortwave periodic unit"
        class: experimental
        purpose: unit
        command:
          - "{python}"
          - "-m"
          - "unittest"
          - "discover"
          - "-s"
          - "{repo_root}/tools/python/tests"
          - "-p"
          - "test_directshortwave_periodic.py"
      - label: "experimental: directshortwave integration"
        class: experimental
        purpose: integration
        command:
          - "{python}"
          - "{tests_dir}/integration/directshortwave/test_directshortwave.py"
      - label: "experimental: new vegetation module against v2.2"
        class: experimental
        purpose: regression
        command:
          - "{python}"
          - "{tests_dir}/regression/new_vegetation_module_against_v2.2/run_test.py"
          - "v2.2.0"
          - "{branch_b}"
          - "{build_type}"

  all:
    includes:
      - supported
      - experimental
