name: udales
channels:
  - defaults
  - conda-forge
dependencies:
  - python=3.9
  - pip
  # Tests
  - numpy
  - scipy
  - pandas
  - xarray
  - netCDF4
  - h5netcdf
  - trimesh
  - shapely
  - matplotlib
  - f90nml
  - numba
  - pvlib
  - meson
  - ninja
  # Docs
  - graphviz
  - mkdocs-material
  - mkdocs-material-extensions
  - pip:
    - triangle
    - mkdocs-bibtex
    - ford
    # PyVista is the default (core) 3-D backend; the [jupyter] extra adds the
    # trame stack for interactive notebook rendering and self-contained HTML.
    # The optional Plotly backend is installed separately in its own CI job.
    - pyvista[jupyter]>=0.43.0
